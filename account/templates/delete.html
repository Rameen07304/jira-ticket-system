{% extends 'base.html' %}

{% block title %}Delete Account{% endblock %}

{% block content %}
<div class="delete-container">
    <h2>Are you sure you want to delete your account?</h2>
    <form method="post">
        {% csrf_token %}
        <input type="submit" value="Delete">
    </form>
    <p><a href="{% url 'profile' %}">Cancel</a></p>
</div>
{% endblock %}
