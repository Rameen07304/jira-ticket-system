{% extends 'base.html' %}

{% block title %}Edit User{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="form-container">
            <h2>Edit User</h2>
            <p class="subtitle">Update {{ profile.user.username }}'s profile</p>

            <form method="post">
                {% csrf_token %}
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" value="{{ profile.user.first_name }}">

                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" value="{{ profile.user.last_name }}">

                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" value="{{ profile.dob|date:'Y-m-d' }}">

                <label for="city">City</label>
                <input type="text" id="city" name="city" value="{{ profile.city }}">

                <label for="country">Country</label>
                <input type="text" id="country" name="country" value="{{ profile.country }}">

                <label for="pincode">Pin Code</label>
                <input type="text" id="pincode" name="pincode" value="{{ profile.pincode }}">

                <label for="address">Address</label>
                <textarea id="address" name="address" rows="3">{{ profile.address }}</textarea>

                <div class="button-group">
                    <input type="submit" value="Save Changes" class="btn-primary-custom">
                    <a href="{% url 'home' %}" class="action-btn action-logout">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
